<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Butylacetat Rückführanlage</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    model-viewer{
      width:100%;
      height:85vh;
      background:white;
    }
  </style>
</head>

<body>

<h1>Butylacetat Rückführanlage</h1>

<model-viewer
    src="Rückführanlage-Butylacetat.glb"
    camera-controls
    auto-rotate
    ar
    orientation="180deg 0deg 0deg"
    shadow-intensity="1"
    exposure="1">
</model-viewer>

</body>
</html>
