<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Butylacetat Rückführanlage</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      text-align:center;
    }

    h1{
      margin-top:20px;
    }

    model-viewer{
      width:100%;
      height:85vh;
      background:white;
    }
  </style>
</head>

<body>

<h1>Butylacetat Rückführanlage</h1>

<model-viewer
    src="Rückführung-Butylacetat.glb"
    camera-controls
    auto-rotate
    ar
    shadow-intensity="1"
    exposure="1"
    camera-target="0m 0m 0m"
    camera-orbit="45deg 75deg 2m"
    min-camera-orbit="auto auto 0.2m"
    max-camera-orbit="auto auto 10m"
    field-of-view="25deg">
</model-viewer>

</body>
</html>
